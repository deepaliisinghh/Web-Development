<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #main{
            /*border: 2px solid red;*/
            height: 700px;
            display: grid;
            grid-template-columns: 200px 200px 200px;
            grid-template-rows: 200px 200px;
            gap: 10px;
            flex-direction: row;
            justify-content: center;
        }
        #main div{
            /*border: 2px solid green;*/
            overflow: hidden;
            position: relative;
            border-radius: 5%;
        }
        #one{
            background-color: rebeccapurple;
            grid-row-start: 2;
            grid-row-end: 3 ;
            grid-column: span 2;
            /*grid-column-start: 3;
            /*grid-column-end: 4;*/
        }
        #five{
            background-color: aqua;
            grid-row: span 2;
        }
        #seven{
            background-color: yellowgreen;
            height: 200px;
        }
        #eight{
              height: 200px;
        }
        
        #main div img{
            height: 100%;
            width: 100%;
            object-fit: cover;
            transition: transform 0.4s ease, filter 0.4 ease;
        }
        #main div:hover img{
            transform: scale(1.1);
            filter: brightness(80%);
        }

    
    </style>
</head>
<body>
    <div id="main">
        <div id="one"><img src="https://images.unsplash.com/photo-1771329335427-6fff712c47d6?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
        <div id="two"><img src="https://images.unsplash.com/photo-1771280755150-e4bf2e4066ac?q=80&w=685&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
        <div id="three"><img src="https://images.unsplash.com/photo-1771272338329-1ab5145559a5?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
        <div id="four"><img src="https://images.unsplash.com/photo-1771387925581-cb0e1d64f506?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
        <div id="five"><img src="https://images.unsplash.com/photo-1771385706196-4cb302a5ad20?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
        <div id="six"><img src="https://plus.unsplash.com/premium_photo-1770246101715-d173eb120dbf?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
        <div id="seven"><img src="https://plus.unsplash.com/premium_photo-1708834155836-4eec278332b6?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
        <div id="eight"><img src="https://images.unsplash.com/photo-1771138751580-9a143f4a2e90?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"></div>
    </div>
</body>
</html>
